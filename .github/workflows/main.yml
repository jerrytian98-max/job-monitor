name: Daily Job Scraper

on:
  schedule:
    # 每天北京时间早上 8:00 运行 (UTC 时间 0:00)
    - cron: '0 13 * * *'
  workflow_dispatch: # 允许在网页上手动点击按钮触发运行

jobs:
  scrape-jobs:
    runs-on: ubuntu-latest
    
    # 授予写入仓库的权限，以便更新数据库文件
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # 安装 playwright 浏览器
          playwright install chromium
          playwright install-deps

    - name: Run Scraper
      run: |
        # 运行您的程序（调用现有的逻辑）
        python -c "from app import run_monitor; run_monitor()"
          
      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add jobs.db jobs_cache.json app.log
          git commit -m "Auto-update job database and logs" || echo "No changes to commit"
          git push
